name: Lint

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v7

      - name: Sync project dependencies
        run: uv sync --all-groups --frozen

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run unit tests
        run: uv run pytest -q tests/unit/test_eia_grid_batch_tasks.py tests/unit/test_dbt_testing_contracts.py

      - name: Run SQLFluff
        run: uv run sqlfluff lint --config .sqlfluff.ci dbt/models
