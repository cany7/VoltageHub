name: Lint

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ci-placeholder
      GCP_REGION: us-central1
      GCP_SERVICE_ACCOUNT_KEY_PATH: /tmp/ci-service-account.json
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/ci-service-account.json
      BQ_DATASET_RAW: raw
      BQ_DATASET_STAGING: staging
      BQ_DATASET_MARTS: marts
      BQ_DATASET_META: meta
      UV_CACHE_DIR: /tmp/uv-cache
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v7

      - name: Sync project dependencies
        run: uv sync --all-groups --frozen

      - name: Create placeholder service-account file
        run: printf '{}' > "$GCP_SERVICE_ACCOUNT_KEY_PATH"

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run unit tests
        run: uv run pytest -q tests/unit/test_eia_grid_batch_tasks.py tests/unit/test_dbt_testing_contracts.py

      - name: Run SQLFluff
        run: uv run --with 'dbt-core==1.8.*' --with 'dbt-bigquery==1.8.*' sqlfluff lint dbt/models
